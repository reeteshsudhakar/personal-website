name: Vercel Preview

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

permissions:
    contents: read
    pull-requests: write
    deployments: write

jobs:
    deploy-preview:
        runs-on: ubuntu-latest
        env:
            NODE_VERSION: "24"
            NPM_VERSION: "10.8.2"
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        steps:
            - name: Determine preview eligibility
              id: guard
              run: |
                  if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
                    echo "should_run=false" >> "$GITHUB_OUTPUT"
                    echo "reason=PR is draft" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
                    echo "should_run=false" >> "$GITHUB_OUTPUT"
                    echo "reason=PR is from fork (secrets unavailable)" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ -z "${{ env.VERCEL_TOKEN }}" ] || [ -z "${{ env.VERCEL_ORG_ID }}" ] || [ -z "${{ env.VERCEL_PROJECT_ID }}" ]; then
                    echo "should_run=false" >> "$GITHUB_OUTPUT"
                    echo "reason=missing Vercel secrets (blocking)" >> "$GITHUB_OUTPUT"
                    echo "Required Vercel secrets are missing for a same-repo non-draft PR."
                    exit 1
                  fi

                  echo "should_run=true" >> "$GITHUB_OUTPUT"
                  echo "reason=eligible" >> "$GITHUB_OUTPUT"

            - name: Checkout
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              uses: actions/checkout@v6

            - name: Set app version
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              run: echo "APP_VERSION=pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

            - name: Setup Node
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  package-manager-cache: false

            - name: Setup npm
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              run: npm install -g npm@${{ env.NPM_VERSION }}

            - name: Install dependencies
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              run: npm ci

            - name: Install Vercel CLI
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              run: npm install --global vercel@latest

            - name: Pull Vercel Environment Information
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              run: vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}

            - name: Build Project Artifacts
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              run: NEXT_PUBLIC_APP_VERSION=${{ env.APP_VERSION }} vercel build --token=${{ env.VERCEL_TOKEN }}

            - name: Deploy Preview to Vercel
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              id: deploy
              run: |
                  output="$(vercel deploy --prebuilt --token=${{ env.VERCEL_TOKEN }} --yes)"
                  url="$(echo "$output" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1)"
                  if [ -z "$url" ]; then
                    echo "Could not determine preview URL from Vercel output."
                    echo "$output"
                    exit 1
                  fi
                  echo "url=$url" >> "$GITHUB_OUTPUT"

            - name: Create GitHub Deployment (Preview)
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              id: gh_deployment
              uses: actions/github-script@v7
              with:
                  script: |
                      const environment = `preview/pr-${context.payload.pull_request.number}`;
                      const deployment = await github.rest.repos.createDeployment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: context.payload.pull_request.head.sha,
                        environment,
                        description: "Vercel preview deployment",
                        auto_merge: false,
                        required_contexts: [],
                        transient_environment: true,
                        production_environment: false
                      });
                      core.setOutput("deployment_id", String(deployment.data.id));

            - name: Set GitHub Deployment Status (Preview)
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const deploymentId = Number("${{ steps.gh_deployment.outputs.deployment_id }}");
                      await github.rest.repos.createDeploymentStatus({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        deployment_id: deploymentId,
                        state: "success",
                        environment_url: "${{ steps.deploy.outputs.url }}",
                        log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                        description: "Preview deployment is ready"
                      });

            - name: Comment Preview URL on PR
              if: ${{ steps.guard.outputs.should_run == 'true' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const marker = "<!-- vercel-preview-url -->";
                      const url = "${{ steps.deploy.outputs.url }}";
                      const body = `${marker}
                      ### Vercel Preview
                      [Open Preview](${url})
                      `;
                      const { owner, repo } = context.repo;
                      const issue_number = context.issue.number;
                      const comments = await github.paginate(github.rest.issues.listComments, {
                        owner,
                        repo,
                        issue_number,
                        per_page: 100
                      });
                      const existing = comments.find((c) => c.body && c.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner,
                          repo,
                          comment_id: existing.id,
                          body
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number,
                          body
                        });
                      }

            - name: Write preview summary
              run: |
                  {
                    echo "## Vercel Preview Summary"
                    echo ""
                    echo "- Eligible: \`${{ steps.guard.outputs.should_run }}\`"
                    echo "- Reason: ${{ steps.guard.outputs.reason }}"
                    if [ "${{ steps.guard.outputs.should_run }}" = "true" ]; then
                      echo "- URL: ${{ steps.deploy.outputs.url }}"
                    fi
                    echo "- Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  } >> "$GITHUB_STEP_SUMMARY"
