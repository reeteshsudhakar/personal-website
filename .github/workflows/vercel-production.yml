name: Vercel Production

on:
    workflow_dispatch:
        inputs:
            release_tag:
                description: "Release tag to deploy (for example: v1.1.0)"
                required: true
                type: string

permissions:
    contents: read
    deployments: write

jobs:
    deploy-production:
        runs-on: ubuntu-latest
        env:
            NODE_VERSION: "24"
            NPM_VERSION: "10.8.2"
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.release_tag }}

            - name: Set app version
              run: echo "APP_VERSION=${{ inputs.release_tag }}" >> "$GITHUB_ENV"

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  package-manager-cache: false

            - name: Setup npm
              run: npm install -g npm@${{ env.NPM_VERSION }}

            - name: Install dependencies
              run: npm ci

            - name: Install Vercel CLI
              run: npm install --global vercel@latest

            - name: Pull Vercel Environment Information
              run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

            - name: Build Project Artifacts
              run: NEXT_PUBLIC_APP_VERSION=${{ env.APP_VERSION }} vercel build --prod --token=${{ env.VERCEL_TOKEN }}

            - name: Deploy Production to Vercel
              id: deploy
              run: |
                  output="$(vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }} --yes)"
                  url="$(echo "$output" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1)"
                  if [ -z "$url" ]; then
                    echo "Could not determine production URL from Vercel output."
                    echo "$output"
                    exit 1
                  fi
                  echo "url=$url" >> "$GITHUB_OUTPUT"

            - name: Create GitHub Deployment (Production)
              id: gh_deployment
              uses: actions/github-script@v7
              with:
                  script: |
                      const deployment = await github.rest.repos.createDeployment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: process.env.RELEASE_TAG,
                        environment: "production",
                        description: "Vercel production deployment",
                        auto_merge: false,
                        required_contexts: [],
                        transient_environment: false,
                        production_environment: true
                      });
                      core.setOutput("deployment_id", String(deployment.data.id));
              env:
                  RELEASE_TAG: ${{ inputs.release_tag }}

            - name: Set GitHub Deployment Status (Production)
              uses: actions/github-script@v7
              with:
                  script: |
                      const deploymentId = Number("${{ steps.gh_deployment.outputs.deployment_id }}");
                      await github.rest.repos.createDeploymentStatus({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        deployment_id: deploymentId,
                        state: "success",
                        environment_url: "${{ steps.deploy.outputs.url }}",
                        log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                        description: "Production deployment is ready"
                      });
