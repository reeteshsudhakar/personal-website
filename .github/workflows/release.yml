name: Release

on:
    push:
        branches:
            - master
    workflow_dispatch:

permissions:
    contents: write
    issues: write
    pull-requests: write
    deployments: write

jobs:
    release:
        runs-on: ubuntu-latest
        outputs:
            new_release_published: ${{ steps.semantic_release.outputs.new_release_published }}
            new_release_git_tag: ${{ steps.semantic_release.outputs.new_release_git_tag }}
        env:
            NODE_VERSION: "24"
            NPM_VERSION: "10.8.2"
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  package-manager-cache: false

            - name: Setup npm
              run: npm install -g npm@${{ env.NPM_VERSION }}

            - name: Print tool versions
              run: |
                  node --version
                  npm --version

            - name: Install dependencies
              run: npm ci

            - name: Validate
              run: |
                  npm run typecheck
                  npm run lint

            - name: Semantic release
              id: semantic_release
              uses: cycjimmy/semantic-release-action@v4
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HUSKY: 0
                  HUSKY_SKIP_HOOKS: 1

            - name: Log semantic-release outputs
              run: |
                  echo "new_release_published=${{ steps.semantic_release.outputs.new_release_published }}"
                  echo "new_release_git_tag=${{ steps.semantic_release.outputs.new_release_git_tag }}"

            - name: Write release summary
              run: |
                  {
                    echo "## Release Summary"
                    echo ""
                    echo "- Published: \`${{ steps.semantic_release.outputs.new_release_published }}\`"
                    echo "- Tag: \`${{ steps.semantic_release.outputs.new_release_git_tag || 'n/a' }}\`"
                  } >> "$GITHUB_STEP_SUMMARY"

    deploy-production:
        needs: release
        if: ${{ needs.release.outputs.new_release_published == 'true' }}
        runs-on: ubuntu-latest
        env:
            NODE_VERSION: "24"
            NPM_VERSION: "10.8.2"
            RELEASE_TAG: ${{ needs.release.outputs.new_release_git_tag }}
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
            VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        steps:
            - name: Validate Vercel secrets
              run: |
                  test -n "${{ env.VERCEL_TOKEN }}" || (echo "Missing VERCEL_TOKEN" && exit 1)
                  test -n "${{ env.VERCEL_ORG_ID }}" || (echo "Missing VERCEL_ORG_ID" && exit 1)
                  test -n "${{ env.VERCEL_PROJECT_ID }}" || (echo "Missing VERCEL_PROJECT_ID" && exit 1)

            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ env.RELEASE_TAG }}

            - name: Set app version
              run: echo "APP_VERSION=${{ env.RELEASE_TAG }}" >> "$GITHUB_ENV"

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  package-manager-cache: false

            - name: Setup npm
              run: npm install -g npm@${{ env.NPM_VERSION }}

            - name: Install dependencies
              run: npm ci

            - name: Install Vercel CLI
              run: npm install --global vercel@latest

            - name: Pull Vercel Environment Information
              run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

            - name: Build Project Artifacts
              run: NEXT_PUBLIC_APP_VERSION=${{ env.APP_VERSION }} vercel build --prod --token=${{ env.VERCEL_TOKEN }}

            - name: Deploy Production to Vercel
              id: deploy
              run: |
                  output="$(vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }} --yes)"
                  url="$(echo "$output" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1)"
                  if [ -z "$url" ]; then
                    echo "Could not determine production URL from Vercel output."
                    echo "$output"
                    exit 1
                  fi
                  echo "url=$url" >> "$GITHUB_OUTPUT"
                  echo "production_url=$url"

            - name: Create GitHub Deployment (Production)
              id: gh_deployment
              uses: actions/github-script@v7
              with:
                  script: |
                      const deployment = await github.rest.repos.createDeployment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: process.env.RELEASE_TAG,
                        environment: "production",
                        description: "Vercel production deployment",
                        auto_merge: false,
                        required_contexts: [],
                        transient_environment: false,
                        production_environment: true
                      });
                      core.setOutput("deployment_id", String(deployment.data.id));
              env:
                  RELEASE_TAG: ${{ env.RELEASE_TAG }}

            - name: Set GitHub Deployment Status (Production)
              uses: actions/github-script@v7
              with:
                  script: |
                      const deploymentId = Number("${{ steps.gh_deployment.outputs.deployment_id }}");
                      await github.rest.repos.createDeploymentStatus({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        deployment_id: deploymentId,
                        state: "success",
                        environment_url: "${{ steps.deploy.outputs.url }}",
                        log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                        description: "Production deployment is ready"
                      });

            - name: Write production summary
              run: |
                  {
                    echo "## Production Deployment Summary"
                    echo ""
                    echo "- Release tag: \`${{ env.RELEASE_TAG }}\`"
                    echo "- URL: ${{ steps.deploy.outputs.url }}"
                    echo "- Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  } >> "$GITHUB_STEP_SUMMARY"
