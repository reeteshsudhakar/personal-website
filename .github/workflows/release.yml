name: Release

on:
    push:
        branches:
            - master
    workflow_dispatch:

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest
        env:
            NODE_VERSION: "24"
            NPM_VERSION: "10.8.2"
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  package-manager-cache: false

            - name: Setup npm
              run: npm install -g npm@${{ env.NPM_VERSION }}

            - name: Print tool versions
              run: |
                  node --version
                  npm --version

            - name: Install dependencies
              run: npm ci

            - name: Validate
              run: |
                  npm run typecheck
                  npm run lint

            - name: Semantic release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HUSKY: 0
                  HUSKY_SKIP_HOOKS: 1
              run: npx semantic-release
